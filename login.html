      <div>
        <h2 class="text-center text-3xl font-serif font-medium text-gg-dark">Sign in to your account</h2>
        <p class="mt-2 text-center text-sm text-gray-600">
          Or
          <a href="register.html" class="font-medium text-gg-dark hover:underline">
            create a new account
          </a>
        </p>
      </div>
      <form class="mt-8 space-y-6" id="loginForm">
        <div class="space-y-4">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
            <div class="mt-1">
              <input id="email" name="email" type="email" autocomplete="email" required class="input-field"
                placeholder="Enter your email">
            </div>
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <div class="mt-1">
              <input id="password" name="password" type="password" autocomplete="current-password" required
                class="input-field" placeholder="Enter your password">
            </div>
          </div>
        </div>

        <div class="flex items-center justify-between">
